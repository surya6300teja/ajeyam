# .github/workflows/cicd.yml

name: Deploy MERN App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Fix Directory Permissions
        run: sudo chown -R $USER:$USER .

      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend Image
        uses: docker/build-push-action@v5
        with:
          context: ./server
          file: ./server/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mern-backend:latest
          cache-from: type=inline
          cache-to: type=inline

      - name: Build and Push Frontend Image
        uses: docker/build-push-action@v5
        with:
          context: ./client
          file: ./client/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/mern-frontend:latest
          build-args: |
            VITE_API_URL=https://api.ajeyam.in/api/v1
            VITE_GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}
          no-cache: true

      # ---- NEW STEP TO CREATE .ENV FILE ----
      - name: Create .env file for Backend
        run: |
          echo "Creating .env file..."
          echo "MONGODB_URL=${{ secrets.MONGODB_URL }}" > .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
          echo "GOOGLE_CLIENT_ID=${{ secrets.GOOGLE_CLIENT_ID }}" >> .env
          echo ".env file created successfully."

      - name: Deploy to EC2 with Docker Compose
        run: |
          echo "Pulling latest images..."
          docker-compose pull
          
          echo "Ensuring nginx is running (non-destructive)..."
          docker-compose up -d nginx
          
          echo "Recreating backend and frontend only (zero-downtime for nginx)..."
          docker-compose up -d --build --force-recreate --no-deps backend frontend
          
          echo "Reloading nginx config (no restart needed)..."
          docker-compose exec -T nginx nginx -s reload || true
          
          echo "Cleaning up dangling images..."
          docker image prune -f