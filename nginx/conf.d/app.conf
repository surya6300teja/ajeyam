# ===== Gzip Compression =====
gzip on;
gzip_vary on;
gzip_proxied any;
gzip_comp_level 6;
gzip_min_length 256;
gzip_types
    text/plain
    text/css
    text/xml
    text/javascript
    application/json
    application/javascript
    application/xml
    application/xml+rss
    application/x-javascript
    image/svg+xml;

# ===== Frontend — ajeyam.in =====

server {
    listen 80;
    server_name ajeyam.in www.ajeyam.in;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== API — api.ajeyam.in =====

server {
    listen 80;
    server_name api.ajeyam.in;
    server_tokens off;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ===== Frontend HTTPS =====

server {
    listen 443 ssl;
    server_name ajeyam.in www.ajeyam.in;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/ajeyam.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ajeyam.in/privkey.pem;
    include /etc/nginx/ssl/options-ssl-nginx.conf;
    ssl_dhparam /etc/nginx/ssl/ssl-dhparams.pem;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        proxy_pass http://frontend:80;
        proxy_set_header Host $http_host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Social media crawlers requesting blog pages get server-rendered OG tags
    location ~ ^/blogs/(.+)$ {
        set $is_crawler 0;
        if ($http_user_agent ~* "facebookexternalhit|twitterbot|whatsapp|telegram|linkedinbot|bot|crawler|spider|pinterest|slackbot|discordbot") {
            set $is_crawler 1;
        }

        if ($is_crawler = 1) {
            proxy_pass http://backend:3001/api/v1/utils/og/blogs/$1;
        }

        # Regular browsers get the React SPA
        if ($is_crawler = 0) {
            proxy_pass http://frontend:80;
        }

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend:80;
        proxy_set_header    Host                $http_host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;
    }
}

# ===== API HTTPS =====

server {
    listen 443 ssl;
    server_name api.ajeyam.in;
    server_tokens off;

    ssl_certificate /etc/letsencrypt/live/ajeyam.in/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ajeyam.in/privkey.pem;
    include /etc/nginx/ssl/options-ssl-nginx.conf;
    ssl_dhparam /etc/nginx/ssl/ssl-dhparams.pem;

    # Allow large request bodies (blog posts with images)
    client_max_body_size 50m;

    location / {
        proxy_pass http://backend:3001;
        proxy_set_header    Host                $http_host;
        proxy_set_header    X-Real-IP           $remote_addr;
        proxy_set_header    X-Forwarded-For     $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto   $scheme;

        # Timeouts for large uploads
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
        proxy_connect_timeout 60s;

        # Buffering settings
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
        proxy_busy_buffers_size 256k;
    }
}
